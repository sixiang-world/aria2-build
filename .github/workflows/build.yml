name: Build Aria2 (Custom)

on:
  workflow_dispatch:
    inputs:
      aria2_ref:
        description: "Aria2 源码分支 / Tag / Commit（留空则使用 master 最新源码）"
        required: false
        default: "master"
      max_connection_per_server:
        description: "MAX_CONNECTION_PER_SERVER 默认值（建议 16，与上限一致）"
        required: false
        default: "16"
      min_split_size:
        description: "MIN_SPLIT_SIZE 最小分片大小（建议 1M）"
        required: false
        default: "1M"
      max_concurrent_downloads:
        description: "MAX_CONCURRENT_DOWNLOADS 最大并发下载数"
        required: false
        default: "16"
      max_split:
        description: "SPLIT 单任务最大分片数（建议 128）"
        required: false
        default: "128"
      target:
        description: "目标平台"
        required: false
        default: "linux-x86_64"
        type: choice
        options:
          - linux-x86_64
          - linux-aarch64
          - windows-x86_64
      enable_static:
        description: "是否静态编译（true/false）"
        required: false
        default: "true"
      extra_configure_flags:
        description: "附加 configure 参数（可留空）"
        required: false
        default: ""
  schedule:
    # 每周一 UTC 03:00 自动拉取最新源码构建一次
    - cron: "0 3 * * 1"

env:
  ARIA2_REF: ${{ github.event.inputs.aria2_ref || 'master' }}
  MAX_CONNECTION_PER_SERVER: ${{ github.event.inputs.max_connection_per_server || '16' }}
  MIN_SPLIT_SIZE: ${{ github.event.inputs.min_split_size || '1M' }}
  MAX_CONCURRENT_DOWNLOADS: ${{ github.event.inputs.max_concurrent_downloads || '16' }}
  MAX_SPLIT: ${{ github.event.inputs.max_split || '128' }}
  TARGET: ${{ github.event.inputs.target || 'linux-x86_64' }}
  ENABLE_STATIC: ${{ github.event.inputs.enable_static || 'true' }}
  EXTRA_CONFIGURE_FLAGS: ${{ github.event.inputs.extra_configure_flags || '' }}

jobs:
  build:
    name: Build Aria2 (${{ github.event.inputs.target || 'linux-x86_64' }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Show build parameters
        run: |
          echo "================ 构建参数 ================"
          echo "ARIA2_REF = $ARIA2_REF"
          echo "TARGET = $TARGET"
          echo "ENABLE_STATIC = $ENABLE_STATIC"
          echo "MAX_CONNECTION_PER_SERVER = $MAX_CONNECTION_PER_SERVER"
          echo "MIN_SPLIT_SIZE = $MIN_SPLIT_SIZE"
          echo "MAX_CONCURRENT_DOWNLOADS = $MAX_CONCURRENT_DOWNLOADS"
          echo "MAX_SPLIT = $MAX_SPLIT"
          echo "EXTRA_CONFIGURE_FLAGS = $EXTRA_CONFIGURE_FLAGS"
          echo "=========================================="

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf automake autopoint libtool pkg-config \
            libcppunit-dev libssl-dev zlib1g-dev libc-ares-dev \
            libsqlite3-dev libssh2-1-dev libgmp-dev libgcrypt20-dev \
            gettext git ca-certificates curl

          if [ "$TARGET" = "linux-aarch64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi

          if [ "$TARGET" = "windows-x86_64" ]; then
            sudo apt-get install -y mingw-w64
          fi

      - name: Clone latest Aria2 source
        run: |
          git clone --depth 1 --branch "$ARIA2_REF" \
            https://github.com/aria2/aria2.git aria2-src || \
            git clone https://github.com/aria2/aria2.git aria2-src && \
            (cd aria2-src && git checkout "$ARIA2_REF")

          cd aria2-src
          echo "Aria2 Commit: $(git rev-parse HEAD)"
          echo "ARIA2_COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Apply DoTheBetter patches (via git am)
        working-directory: aria2-src
        run: |
          cd aria2-src
          PATCH_DIR="${GITHUB_WORKSPACE}/.github/patches"
          echo "=== 应用魔改补丁 ==="
          for patch in \
            aria2-0001-options-change-default-path-to-current-dir.patch \
            aria2-0002-options-unlock-connection-per-server-limit.patch \
            aria2-0003-download-retry-on-slow-speed-and-reset.patch \
            aria2-0004-option_processing-make-use-of-deamon-on-mingw.patch \
            aria2-0005-option-add-option-to-retry-on-http-4xx.patch \
            aria2-0006-feature-config-add-os-info-for-newer-windows.patch; do
            echo "Applying $patch..."
            git am --3way "${PATCH_DIR}/${patch}" || {
              echo "Patch $patch failed, trying --reject..."
              git am --3way --reject "${PATCH_DIR}/${patch}" || true
            }
          done
          echo "=== 补丁应用完成 ==="

      - name: Bootstrap (autoreconf)
        working-directory: aria2-src
        run: autoreconf -i

      - name: Configure
        working-directory: aria2-src
        run: |
          CONFIGURE_FLAGS="--without-gnutls --with-openssl \
            --without-libxml2 --with-libexpat=no --with-libxml2=no \
            --enable-libaria2"

          case "$TARGET" in
            linux-x86_64)
              CONFIGURE_FLAGS="$CONFIGURE_FLAGS --with-libcares --with-sqlite3 --with-libssh2 --with-libgmp --with-libgcrypt"
              ;;
            linux-aarch64)
              CONFIGURE_FLAGS="$CONFIGURE_FLAGS --with-libcares --with-sqlite3 --with-libssh2 --with-libgmp --with-libgcrypt --host=aarch64-linux-gnu"
              ;;
            windows-x86_64)
              # Windows: 禁用所有需要交叉编译依赖库的特性
              # c-ares(Linux only)、sqlite3/libssh2/gmp/gcrypt/zlib(需MinGW交叉编译)
              CONFIGURE_FLAGS="$CONFIGURE_FLAGS \
                --without-libcares \
                --without-libssh2 \
                --without-libgmp \
                --without-libgcrypt \
                --without-sqlite3 \
                --without-libz \
                --host=x86_64-w64-mingw32"
              ;;
          esac

          if [ "$ENABLE_STATIC" = "true" ]; then
            CONFIGURE_FLAGS="$CONFIGURE_FLAGS LDFLAGS=-static"
          fi

          ./configure $CONFIGURE_FLAGS $EXTRA_CONFIGURE_FLAGS 2>&1 | tail -20

      - name: Build
        working-directory: aria2-src
        run: make -j"$(nproc)"

      - name: Package artifacts
        run: |
          mkdir -p dist
          BIN_NAME="aria2c"
          [ "$TARGET" = "windows-x86_64" ] && BIN_NAME="aria2c.exe"
          cp "aria2-src/src/${BIN_NAME}" "dist/${BIN_NAME}"
          (cd dist && tar -czf "aria2-${TARGET}-${ARIA2_COMMIT}.tar.gz" "${BIN_NAME}")
          ls -lh dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria2-${{ env.TARGET }}-${{ env.ARIA2_COMMIT }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 30
